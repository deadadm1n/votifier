name: Build

on:
  push:
    branches: [main, 'mc/**']
  pull_request:
    branches: [main, 'mc/**']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect Java version
        id: java
        run: |
          JAVA_VERSION=$(grep 'java_version=' gradle.properties | cut -d'=' -f2)
          echo "version=$JAVA_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ steps.java.outputs.version }}
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build

      - name: Verify JARs
        run: bash scripts/verify-jars.sh

      - name: Upload Forge artifact
        uses: actions/upload-artifact@v4
        with:
          name: forge-jar
          path: forge/build/libs/*.jar
        if: hashFiles('forge/build/libs/*.jar') != ''

      - name: Upload Fabric artifact
        uses: actions/upload-artifact@v4
        with:
          name: fabric-jar
          path: fabric/build/libs/*.jar

      - name: Upload NeoForge artifact
        uses: actions/upload-artifact@v4
        with:
          name: neoforge-jar
          path: neoforge/build/libs/*.jar
        if: hashFiles('neoforge/build/libs/*.jar') != ''

  server-smoke-test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        loader: [neoforge, forge, fabric]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for loader subproject
        id: check
        run: |
          if [ -f ${{ matrix.loader }}/build.gradle ]; then
            echo "has_loader=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_loader=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect Java version
        if: steps.check.outputs.has_loader == 'true'
        id: java
        run: |
          JAVA_VERSION=$(grep 'java_version=' gradle.properties | cut -d'=' -f2)
          echo "version=$JAVA_VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up JDK
        if: steps.check.outputs.has_loader == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: ${{ steps.java.outputs.version }}
          distribution: 'temurin'

      - name: Setup Gradle
        if: steps.check.outputs.has_loader == 'true'
        uses: gradle/actions/setup-gradle@v4

      - name: Build project
        if: steps.check.outputs.has_loader == 'true'
        run: ./gradlew build

      - name: Accept EULA
        if: steps.check.outputs.has_loader == 'true'
        run: |
          mkdir -p ${{ matrix.loader }}/run
          echo "eula=true" > ${{ matrix.loader }}/run/eula.txt
          mkdir -p ${{ matrix.loader }}/runs/server
          echo "eula=true" > ${{ matrix.loader }}/runs/server/eula.txt

      - name: Start server in background
        if: steps.check.outputs.has_loader == 'true'
        run: ./gradlew :${{ matrix.loader }}:runServer > server-${{ matrix.loader }}.log 2>&1 &
        env:
          CI: true

      - name: Wait for Votifier to start
        if: steps.check.outputs.has_loader == 'true'
        run: |
          timeout=300
          elapsed=0
          while [ $elapsed -lt $timeout ]; do
            if [ -f server-${{ matrix.loader }}.log ]; then
              if grep -q "Votifier server started on" server-${{ matrix.loader }}.log; then
                echo "Votifier started successfully"
                exit 0
              fi
              if grep -qE "ModLoadingException|the server has crashed|ERROR.*failed to load" server-${{ matrix.loader }}.log; then
                echo "Server crash detected!"
                tail -50 server-${{ matrix.loader }}.log
                exit 1
              fi
            fi
            sleep 5
            elapsed=$((elapsed + 5))
          done
          echo "Timed out after ${timeout}s waiting for Votifier to start"
          if [ -f server-${{ matrix.loader }}.log ]; then
            tail -100 server-${{ matrix.loader }}.log
          fi
          exit 1

      - name: Stop server
        if: always() && steps.check.outputs.has_loader == 'true'
        run: |
          pkill -f "runServer" || true
          pkill -f "minecraft" || true

      - name: Upload server log
        if: always() && steps.check.outputs.has_loader == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: server-log-${{ matrix.loader }}
          path: server-${{ matrix.loader }}.log
